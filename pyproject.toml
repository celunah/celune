[project]
name = "celune"
version = "3.1.0"
requires-python = ">=3.12,<3.14"
dependencies = [
	# AI stack
    "torch==2.11.0+cu128",
    "torchaudio==2.11.0+cu128",
    # Celune sounds best with faster-qwen3-tts 0.2.4.
    # You can use version 0.2.5 with Celune 3.0.0 or later, but the speech may end abruptly, depending on the input.
    "faster-qwen3-tts==0.2.4",
    "hf-xet",
    "huggingface-hub",
    "transformers",

	# Audio processing
    "numpy",
    "scipy",
    "pedalboard",
    "pyrubberband",
    "soundfile",
    "sounddevice",

    # UX & UI
    "textual",
    "rich",
    "openrgb-python",

	# Others
    "psutil",
]

[tool.uv.sources]
torch = [{ index = "pytorch-cu128" }]
torchaudio = [{ index = "pytorch-cu128" }]
torchvision = [{ index = "pytorch-cu128" }]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
